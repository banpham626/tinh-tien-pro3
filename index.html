<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hệ Thống Tính Tiền MMO</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --primary: #2563eb; --secondary: #f43f5e; --bg: #f1f5f9; --text: #1e293b; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: -apple-system, system-ui, sans-serif; background: var(--bg); margin: 0; padding: 12px; color: var(--text); line-height: 1.5; }
        
        .app-container { max-width: 500px; margin: 0 auto; }
        header { text-align: center; margin-bottom: 20px; padding: 10px 0; }
        h2 { font-size: 20px; margin: 0; color: #0f172a; letter-spacing: 0.5px; }

        /* Card Style */
        .card { background: white; border-radius: 16px; padding: 16px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); margin-bottom: 16px; }
        
        textarea { width: 100%; height: 140px; border: 2px solid #e2e8f0; border-radius: 12px; padding: 12px; font-size: 15px; resize: none; outline: none; transition: 0.2s; font-family: 'Courier New', Courier, monospace; }
        textarea:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1); }

        /* Button Grid */
        .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 16px; }
        button { border: none; border-radius: 12px; padding: 14px; font-weight: 600; font-size: 14px; color: white; cursor: pointer; transition: 0.2s; display: flex; align-items: center; justify-content: center; gap: 8px; }
        button:active { transform: scale(0.96); opacity: 0.9; }
        
        .btn-calc { background: var(--primary); grid-column: span 2; font-size: 16px; padding: 16px; }
        .btn-copy { background: #8b5cf6; }
        .btn-print { background: #10b981; }
        .btn-clear { background: #64748b; grid-column: span 2; padding: 10px; font-size: 13px; }

        /* Result Area */
        .money-display { background: #fff1f2; border: 1.5px solid #fecdd3; border-radius: 16px; text-align: center; padding: 20px; }
        .money-label { font-size: 13px; font-weight: bold; color: var(--secondary); text-transform: uppercase; }
        .money-val { font-size: 36px; font-weight: 800; color: var(--secondary); margin: 8px 0; display: block; }
        .money-sub { font-size: 12px; color: #94a3b8; }

        .detail-box { font-size: 14px; border-left: 4px solid var(--primary); background: #f8fafc; padding: 12px; border-radius: 0 12px 12px 0; margin-top: 12px; overflow-x: auto; }
        
        /* QR Code Footer */
        .qr-section { text-align: center; padding: 10px; }
        .qr-label { font-size: 11px; color: #64748b; margin-bottom: 10px; display: block; }
        #qrcode-screen { display: flex; justify-content: center; background: white; padding: 10px; border-radius: 12px; }
        #sec-code-display { font-family: monospace; font-size: 13px; margin-top: 8px; color: #1e293b; font-weight: bold; }

        /* Formatting */
        .num-blue { color: var(--primary); font-weight: 700; }
        .cash-red { color: var(--secondary); font-weight: 700; }
        .label-type { background: #e2e8f0; padding: 1px 5px; border-radius: 4px; font-size: 12px; margin: 0 2px; }
        .valid-row { margin-bottom: 10px; border-bottom: 1px solid #e2e8f0; padding-bottom: 8px; }
        .valid-row strong { color: #0f172a; font-size: 15px; }

        /* Toast */
        #toast { visibility: hidden; position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: #334155; color: white; padding: 12px 24px; border-radius: 50px; font-size: 14px; z-index: 9999; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); }
        #toast.show { visibility: visible; animation: fadeInOut 2.8s; }
        @keyframes fadeInOut { 0%, 100% { opacity: 0; bottom: 20px; } 15%, 85% { opacity: 1; bottom: 30px; } }

        @media print { .no-print { display: none !important; } .app-container { width: 80mm; } }
    </style>
</head>
<body>

<div class="app-container">
    <header class="no-print">
        <h2>HỆ THỐNG TÍNH TIỀN</h2>
    </header>

    <div class="card no-print">
        <textarea id="raw_input" placeholder="Nhập dữ liệu: đài: số kiểu tiền..."></textarea>
    </div>

    <div class="btn-grid no-print">
        <button class="btn-calc" onclick="thucThi()">🚀 XÁC NHẬN</button>
        <button class="btn-copy" onclick="copyZalo()">📄 COPY</button>
        <button class="btn-print" onclick="window.print()">🖨️ IN KQ</button>
        <button class="btn-clear" onclick="xoaHet()">LÀM LẠI</button>
    </div>

    <div id="result_area" class="card" style="display:none;">
        <div class="money-display">
            <span class="money-label">TỔNG THANH TOÁN</span>
            <span id="result_total" class="money-val">0</span>
            <div class="money-sub">Đã trừ cò 20% (x 0.8)</div>
        </div>
        <div id="result_detail" class="detail-box"></div>
    </div>

    <div id="qr_area" class="card qr-section" style="display:none;">
        <span class="qr-label">MÃ QR ĐỐI SOÁT HÓA ĐƠN</span>
        <div id="qrcode-screen"></div>
        <div id="sec-code-display"></div>
    </div>
</div>

<div id="toast"></div>

<script>
const tg = window.Telegram.WebApp;
tg.expand();
let userId = tg.initDataUnsafe?.user?.id || "";

// 🔴 THAY LINK GOOGLE CỦA BẠN VÀO ĐÂY
const GAS_URL = "https://script.google.com/macros/s/AKfycbzwdvEagOorImdtMLu5bky9BlhBDOlBLBeXCneb8h37I_yEG_p5Zbc7xbvPrAXbCxUt/exec"; 

window.billText = "";

function showToast(m) { let t=document.getElementById("toast"); t.innerText=m; t.className="show"; setTimeout(()=>{t.className=""},2800); }

function copyZalo() {
    if (!window.billText) { showToast("⚠️ Chưa có dữ liệu!"); return; }
    navigator.clipboard.writeText(window.billText).then(()=>showToast("✅ Đã copy vào bộ nhớ!"));
}

function convertDai(d) {
    let dc = d.toLowerCase().trim().normalize("NFD").replace(/[\u0300-\u036f]/g, "").replace(/đ/g, "d");
    if (dc.includes("mb") || dc.includes("hn") || dc.includes("ha noi")) return "hn";
    if (/^[234]d/.test(dc)) return d.toLowerCase().trim();
    return /^\d/.test(dc) ? null : d.toLowerCase().trim();
}

function mapLoaiChoi(s) {
    let sc = s.toLowerCase().trim().normalize("NFD").replace(/[\u0300-\u036f]/g, "").replace(/đ/g, "d").replace(/\s+/g, "");
    if (sc.includes("dauduoi") || sc.includes("dd")) return "dd";
    if (sc.includes("dau")) return "dau";
    if (sc.includes("duoi")) return "duoi";
    if (sc.includes("xiuchu") || sc.includes("xc") || sc.includes("cx")) return "xc";
    if (sc.includes("da")) return "da";
    if (sc.includes("7lo") || sc.includes("b7lo")) return "b7lo";
    if (sc.includes("4lo") || sc.includes("b4lo")) return "b4lo";
    return (sc.includes("bao") || sc.includes("lo") || sc === "b") ? "b" : null;
}

function layHeSo(dai, loai, len) {
    let n = (dai === "hn") ? "MB" : (dai.includes('4d') ? "4D" : (dai.includes('3d') ? "3D" : (dai.includes('2d') ? "2D" : "1D")));
    if (loai === 'b') {
        const b = { "1D":{2:18,3:17,4:16}, "2D":{2:36,3:34,4:32}, "3D":{2:54,3:51,4:48}, "4D":{2:72,3:68,4:64}, "MB":{2:27,3:23,4:20} };
        return b[n][len] || b[n][2];
    }
    const k = { "da":{"1D":36,"2D":72,"3D":216,"4D":432,"MB":54}, "xc":{"1D":2,"2D":4,"3D":6,"4D":8,"MB":4}, "dd":{"1D":2,"2D":4,"3D":6,"4D":8,"MB":5}, "dau":{"1D":1,"2D":2,"3D":3,"4D":4,"MB":1}, "duoi":{"1D":1,"2D":2,"3D":3,"4D":4,"MB":1}, "b7lo":{"1D":7,"2D":14,"3D":21,"4D":28,"MB":7}, "b4lo":{"1D":4,"2D":8,"3D":12,"4D":16,"MB":4} };
    return k[loai]?.[n] || 0;
}

function thucThi() {
    let raw = document.getElementById('raw_input').value;
    if (!raw) { showToast("Vui lòng nhập dữ liệu!"); return; }

    document.getElementById('result_area').style.display = "block";
    document.getElementById('qr_area').style.display = "block";

    raw = raw.replace(/(\d+),(\d+)/g, '$1.$2').replace(/(\d+)\s*-\s*(\d+)/g, '$1-$2');
    let sections = raw.split('|');
    let totalAll = 0, detailHTML = "", secCode = "SEC-" + Math.random().toString(36).substr(2, 5).toUpperCase();
    window.billText = "";

    sections.forEach((s, idx) => {
        let p = s.split(':');
        if (p.length < 2) return;
        let dR = p[0].trim(), d = convertDai(dR);
        if (!d) return;

        window.billText += dR.toUpperCase() + ":\n";
        let ents = p[1].split(','), lineD = [], lastN = [];

        ents.forEach(e => {
            e = e.trim();
            let mMon = e.match(/(\d+(\.\d+)?)$/); if (!mMon) return;
            let tien = parseFloat(mMon[1]), con = e.replace(mMon[1], "").trim();
            let mSo = con.match(/[0-9\-\(\)]{2,}/g), sGR = mSo ? mSo[0].trim() : "";
            let sG = sGR.replace(/[\(\)]/g, ""), lo = mapLoaiChoi(con.replace(sGR, "").trim());
            if (!lo) return;

            let curN = sG ? sG.split('-').filter(n => n.length >= 2) : lastN;
            if (curN.length > 0) {
                let sub = 0;
                if (lo === 'da') {
                    let v = {2:1, 3:3, 4:6, 5:10, 6:15, 7:21, 8:28, 9:36, 10:45};
                    sub = tien * (v[curN.length] || 0) * layHeSo(d, 'da', 0) * 0.8;
                } else {
                    curN.forEach(n => { sub += tien * layHeSo(d, lo, n.length) * 0.8; });
                }
                totalAll += sub;
                lineD.push(`<span class="num-blue">${curN.join('-')}</span><span class="label-type">${lo}</span><span class="cash-red">${tien}</span>`);
                window.billText += `${curN.join('-')} ${lo} ${tien}\n`;
                if (sG) lastN = curN;
            }
        });
        detailHTML += `<div class="valid-row"><strong>${dR.toUpperCase()}</strong><br>${lineD.join(' | ')}</div>`;
    });

    let final = Math.round(totalAll);
    document.getElementById('result_total').innerText = final.toLocaleString();
    document.getElementById('result_detail').innerHTML = detailHTML;
    document.getElementById('sec-code-display').innerText = secCode;

    // QR Code
    let qrData = GAS_URL + "?id=" + secCode;
    document.getElementById('qrcode-screen').innerHTML = "";
    new QRCode(document.getElementById("qrcode-screen"), { text: qrData, width: 140, height: 140, correctLevel: QRCode.CorrectLevel.L });

    // Send to GAS
    fetch(GAS_URL, { method: "POST", body: JSON.stringify({ dai: sections[0].split(':')[0].toUpperCase(), chiTiet: raw, tongTien: final, secCode: secCode, telegramId: userId }) })
    .then(() => showToast("✅ Đã gửi Telegram!")).catch(() => showToast("❌ Lỗi kết nối!"));
}

function xoaHet() { location.reload(); }
</script>
</body>
</html>
