<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
</div>
    <style>
        :root { --primary: #2563eb; --secondary: #f43f5e; --bg: #f8fafc; --text: #1e293b; }
        * { box-sizing: border-box; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); margin: 0; padding: 20px; color: var(--text); }
        
        .app-container { width: 100%; max-width: 1000px; margin: 0 auto; background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        h2 { text-align: center; text-transform: uppercase; margin-bottom: 25px; color: #0f172a; }
        
        textarea { width: 100%; height: 160px; border: 2px solid #e2e8f0; border-radius: 12px; padding: 15px; font-size: 16px; font-family: monospace; outline: none; transition: 0.3s; }
        textarea:focus { border-color: var(--primary); }

        /* Nhóm nút bấm */
        .controls { display: flex; gap: 10px; margin: 20px 0; }
        button { flex: 1; padding: 15px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; color: white; transition: 0.2s; }
        .btn-calc { background: var(--primary); }
        .btn-copy { background: #8b5cf6; }
        .btn-print { background: #10b981; }
        .btn-clear { background: #ef4444; }

        /* Bố cục chính cho PC */
        .result-grid { display: grid; grid-template-columns: 1fr 320px; gap: 25px; }
        .detail-box { border: 1px solid #e2e8f0; border-radius: 12px; padding: 20px; min-height: 300px; background: #f8fafc; }
        
        .money-box { background: #fff1f2; border: 2px solid var(--secondary); border-radius: 15px; text-align: center; padding: 25px; margin-bottom: 20px; }
        .money-box b { font-size: 42px; color: var(--secondary); display: block; margin: 10px 0; }
        
        .qr-box { background: white; border: 1px solid #e2e8f0; border-radius: 12px; padding: 20px; text-align: center; }
        #qrcode-screen { display: flex; justify-content: center; margin: 10px 0; }

        @media (max-width: 768px) {
            body { padding: 10px; }
            .app-container { padding: 15px; border-radius: 0; box-shadow: none; }
            .controls { flex-wrap: wrap; }
            .controls button { flex: 1 1 45%; } 
            .btn-calc { flex: 1 1 100%; font-size: 18px; } 
            .result-grid { grid-template-columns: 1fr; }
            .money-box b { font-size: 36px; }
            .detail-box { min-height: auto; order: 2; } 
            .right-panel { order: 1; } 
        }

        .num-blue { color: var(--primary); font-weight: bold; }
        .cash-red { color: var(--secondary); font-weight: bold; }
        .label-type { background: #e2e8f0; padding: 2px 5px; border-radius: 4px; font-size: 12px; margin: 0 2px; }
        .valid-row { border-bottom: 1px solid #e2e8f0; padding-bottom: 10px; margin-bottom: 10px; }

        #toast { visibility: hidden; position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: #333; color: #fff; padding: 12px 25px; border-radius: 50px; z-index: 1000; }
        #toast.show { visibility: visible; animation: fade 0.5s; }
        @keyframes fade { from {opacity: 0;} to {opacity: 1;} }

        /* --- TÍNH NĂNG ĐỊNH DẠNG BẢN IN --- */
        @media print {
            /* Ẩn giao diện App khi in */
            body > :not(#print_area) { display: none !important; }
            
            /* Chỉ hiện khu vực Biên nhận */
            #print_area { 
                display: block !important; 
                width: 100%; 
                max-width: 400px; /* Mô phỏng khổ giấy in bill */
                margin: 0 auto; 
                color: black; 
                font-family: sans-serif;
            }
            /* Xóa viền trang web mặc định */
            @page { margin: 5mm; } 
            
            /* Tinh chỉnh màu sắc cho bản in đen trắng */
            .num-blue { color: black !important; font-weight: bold; }
            .cash-red { color: black !important; font-weight: bold; }
            .label-type { border: 1px solid #000; background: transparent; }
        }
        #print_area { display: none; } /* Ẩn khu vực này khi đang dùng App bình thường */
    </style>
</head>
<body>

<div class="app-container">
    <h2>Hệ Thống Tính Tiền</h2>
    <textarea id="raw_input" placeholder="Nhập dữ liệu vào đây...&#10;• Nhiều số: dùng dấu (-)&#10;• Nhiều kiểu: dùng dấu (,)&#10;• Sang đài mới: dùng dấu (|)&#10;VD: 2dn: 11 b1, 11-22 đá 1 | hn: 11 đầu 10"></textarea>    <div class="controls no-print">
        <button class="btn-calc" onclick="thucThi()">🚀 XÁC NHẬN</button>
        <button class="btn-copy" onclick="copyZalo()">📋 COPY</button>
        <button class="btn-print" onclick="window.print()">🖨️ IN KẾT QUẢ</button>
        <button class="btn-clear" onclick="xoaHet()">XÓA HẾT</button>
    </div>

    <div class="result-grid">
        <div id="result_detail" class="detail-box">Chưa có dữ liệu...</div>
        
        <div class="right-panel">
            <div class="money-box">
                <span style="font-weight:bold; color:var(--secondary)">TỔNG TIỀN (X 0.8)</span>
                <b><span id="result_total">0</span></b>
            </div>
            <div id="qr_container" class="qr-box" style="display:none;">
                <span style="font-size: 12px; color: #64748b;">MÃ QR ĐỐI SOÁT</span>
                <div id="qrcode-screen"></div>
                <div id="sec-code-display" style="font-weight:bold; font-size:14px;"></div>
            </div>
        </div>
    </div>
</div>

<!-- KHU VỰC ẨN: CHỈ DÀNH RIÊNG CHO MÁY IN -->
<div id="print_area">
    <h2 style="text-align: center; margin: 0; color: black;">BIÊN NHẬN ĐỐI SOÁT</h2>
    <div id="print_time" style="text-align: center; font-size: 14px; margin-bottom: 20px; color: #333;"></div>
    
    <div id="print_detail_content" style="font-size: 16px; margin-bottom: 15px;"></div>
    
    <div style="border-top: 2px dashed black; margin: 15px 0;"></div>
    
    <div style="text-align: center; font-size: 26px; font-weight: bold; margin: 15px 0;">
        TỔNG: <span id="print_total_content"></span>
    </div>
    
    <div style="display: flex; justify-content: center; margin: 15px 0;" id="print_qr_content"></div>
    <div id="print_sec_content" style="text-align: center; font-weight: bold; font-size: 18px; letter-spacing: 1px;"></div>
    
    <div style="text-align: center; margin-top: 25px; font-size: 16px; font-style: italic; font-weight: bold;">
        Cảm ơn quý khách!<br>Chúc may mắn!
    </div>
</div>

<div id="toast"></div>

<script>
const tg = window.Telegram.WebApp;
tg.expand();
let userId = tg.initDataUnsafe?.user?.id || "";

const GAS_URL = "https://script.google.com/macros/s/AKfycbzX5fjmOf0HFcz_PXtk4PU6E0mKQ1c97xDDY1O6d39vdytR4kmPQ9yIGpzStrPfXGiI/exec"; 

window.billText = "";

function showToast(m) { let t=document.getElementById("toast"); t.innerText=m; t.className="show"; setTimeout(()=>{t.className=""},2500); }

function copyZalo() {
    if (!window.billText) { showToast("⚠️ Chưa có dữ liệu!"); return; }
    navigator.clipboard.writeText(window.billText).then(()=>showToast("✅ Đã copy!"));
}

function convertDai(d) {
    let dc = d.toLowerCase().trim().normalize("NFD").replace(/[\u0300-\u036f]/g, "").replace(/đ/g, "d");
    if (dc.includes("mb") || dc.includes("hn") || dc.includes("ha noi")) return "hn";
    if (/^[234]d/.test(dc)) return d.toLowerCase().trim();
    return /^\d/.test(dc) ? null : d.toLowerCase().trim();
}

function mapLoaiChoi(s) {
    let sc = s.toLowerCase().trim().normalize("NFD").replace(/[\u0300-\u036f]/g, "").replace(/đ/g, "d").replace(/\s+/g, "");
    if (sc.includes("dauduoi") || sc.includes("dd")) return "dd";
    if (sc.includes("dau")) return "dau";
    if (sc.includes("duoi")) return "duoi";
    if (sc.includes("xiuchu") || sc.includes("xc") || sc.includes("cx")) return "xc";
    if (sc.includes("da")) return "da";
    if (sc.includes("7lo") || sc.includes("b7lo")) return "b7lo";
    if (sc.includes("4lo") || sc.includes("b4lo")) return "b4lo";
    return (sc.includes("bao") || sc.includes("lo") || sc === "b") ? "b" : null;
}

function layHeSo(dai, loai, len) {
    let n = (dai === "hn") ? "MB" : (dai.includes('4d') ? "4D" : (dai.includes('3d') ? "3D" : (dai.includes('2d') ? "2D" : "1D")));
    if (loai === 'b') {
        const b = { "1D":{2:18,3:17,4:16}, "2D":{2:36,3:34,4:32}, "3D":{2:54,3:51,4:48}, "4D":{2:72,3:68,4:64}, "MB":{2:27,3:23,4:20} };
        return b[n][len] || b[n][2];
    }
    const k = { "da":{"1D":36,"2D":72,"3D":216,"4D":432,"MB":54}, "xc":{"1D":2,"2D":4,"3D":6,"4D":8,"MB":4}, "dd":{"1D":2,"2D":4,"3D":6,"4D":8,"MB":5}, "dau":{"1D":1,"2D":2,"3D":3,"4D":4,"MB":1}, "duoi":{"1D":1,"2D":2,"3D":3,"4D":4,"MB":1}, "b7lo":{"1D":7,"2D":14,"3D":21,"4D":28,"MB":7}, "b4lo":{"1D":4,"2D":8,"3D":12,"4D":16,"MB":4} };
    return k[loai]?.[n] || 0;
}

function thucThi() {
    let raw = document.getElementById('raw_input').value;
    if (!raw) return;

    raw = raw.replace(/(\d+),(\d+)/g, '$1.$2').replace(/(\d+)\s*-\s*(\d+)/g, '$1-$2');
    let sections = raw.split('|');
    let totalAll = 0, detailHTML = "", secCode = "SEC-" + Math.random().toString(36).substr(2, 5).toUpperCase();
    window.billText = "";
    
    // ĐÂY LÀ PHẦN MỚI: Khởi tạo mảng jsonArray để gom dữ liệu
    let jsonArray = [];

    sections.forEach((s, idx) => {
        let p = s.split(':'); if (p.length < 2) return;
        let dR = p[0].trim(), d = convertDai(dR); if (!d) return;

        window.billText += dR.toUpperCase() + ":\n";
        let ents = p[1].split(','), lineD = [], lastN = [];

        ents.forEach(e => {
            e = e.trim();
            let mMon = e.match(/(\d+(\.\d+)?)$/); if (!mMon) return;
            let tien = parseFloat(mMon[1]);
            
            let con = e.slice(0, e.length - mMon[1].length).trim();
            let mSo = con.match(/[0-9\-\(\)]{2,}/g), sGR = mSo ? mSo[0].trim() : "";
            let sG = sGR.replace(/[\(\)]/g, "");
            
            let loStr = sGR ? con.replace(sGR, "").trim() : con;
            let lo = mapLoaiChoi(loStr);
            
            if (!lo) return;

            let curN = sG ? sG.split('-').filter(n => n.length >= 2) : lastN;
            if (curN.length > 0) {
                let sub = 0;
                if (lo === 'da') {
                    let v = {2:1, 3:3, 4:6, 5:10, 6:15, 7:21, 8:28, 9:36, 10:45};
                    sub = tien * (v[curN.length] || 0) * layHeSo(d, 'da', 0) * 0.8;
                } else {
                    curN.forEach(n => { sub += tien * layHeSo(d, lo, n.length) * 0.8; });
                }
                totalAll += sub;
                lineD.push(`<span class="num-blue">${curN.join('-')}</span><span class="label-type">${lo}</span><span class="cash-red">${tien}</span>`);
                window.billText += `${curN.join('-')} ${lo} ${tien}\n`;
                
                // ĐÂY LÀ PHẦN MỚI: Đẩy dữ liệu vào mảng
                jsonArray.push({
                    dai: dR.toUpperCase(),
                    so: curN.join('-'),
                    kieu: lo,
                    tien: tien
                });

                if (sG) lastN = curN;
            }
        });
        detailHTML += `<div class="valid-row"><strong>${dR.toUpperCase()}</strong><br>${lineD.join(' | ')}</div>`;
    });

    let final = Math.round(totalAll);
    
    // Đổ dữ liệu ra màn hình App
    document.getElementById('result_total').innerText = final.toLocaleString();
    document.getElementById('result_detail').innerHTML = detailHTML;
    document.getElementById('sec-code-display').innerText = secCode;
    document.getElementById('qr_container').style.display = "block";
    
    let qrData = GAS_URL + "?id=" + secCode;
    document.getElementById('qrcode-screen').innerHTML = "";
    new QRCode(document.getElementById("qrcode-screen"), { text: qrData, width: 140, height: 140, correctLevel: QRCode.CorrectLevel.L });

    // --- ĐỔ DỮ LIỆU VÀO KHU VỰC IN ẤN ---
    let now = new Date();
    document.getElementById('print_time').innerText = "Thời gian: " + now.toLocaleTimeString('vi-VN') + " - " + now.toLocaleDateString('vi-VN');
    document.getElementById('print_detail_content').innerHTML = detailHTML;
    document.getElementById('print_total_content').innerText = final.toLocaleString();
    
    document.getElementById('print_qr_content').innerHTML = "";
    new QRCode(document.getElementById("print_qr_content"), { text: qrData, width: 160, height: 160, correctLevel: QRCode.CorrectLevel.L });
    document.getElementById('print_sec_content').innerText = secCode;

    // ĐÂY LÀ PHẦN MỚI: Gửi kèm dữ liệu chuẩn lên Google Apps Script
    fetch(GAS_URL, { 
        method: "POST", 
        body: JSON.stringify({ 
            dai: sections[0].split(':')[0].toUpperCase(), 
            chiTiet: raw, 
            tongTien: final, 
            secCode: secCode, 
            telegramId: userId,
            duLieuChuan: JSON.stringify(jsonArray) 
        }) 
    })
    .then(() => showToast("✅ Đã gửi Telegram!")).catch(() => showToast("❌ Bạn đã nhập sai cú pháp!"));
}

function xoaHet() { location.reload(); }
</script>
</body>
</html>
