<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ Thống Tính Tiền MMO - Final Edition</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --primary: #2563eb; --secondary: #f43f5e; --bg: #f8fafc; --error: #ef4444; --copy: #8b5cf6; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); padding: 20px; display: flex; justify-content: center; }
        .app-container { width: 100%; max-width: 1000px; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #1e293b; text-transform: uppercase; margin-bottom: 25px; }
        textarea { width: 100%; height: 180px; padding: 15px; border: 2px solid #e2e8f0; border-radius: 10px; font-size: 16px; box-sizing: border-box; font-family: monospace; }
        .controls { display: flex; gap: 12px; margin: 25px 0; }
        button { flex: 1; padding: 18px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; color: white; text-transform: uppercase; transition: 0.2s; }
        button:active { transform: scale(0.98); }
        .btn-calc { background: var(--primary); }
        .btn-copy { background: var(--copy); } 
        .btn-print { background: #10b981; }
        .btn-clear { background: var(--error); } 
        .result-grid { display: grid; grid-template-columns: 1fr 300px; gap: 25px; }
        .detail-box { border: 1px solid #e2e8f0; border-radius: 10px; padding: 20px; background: #fff; min-height: 300px; line-height: 1.8; overflow-y: auto; }
        .right-panel { display: flex; flex-direction: column; gap: 20px; }
        .money-box { background: #fff1f2; border: 2px solid var(--secondary); border-radius: 15px; text-align: center; padding: 30px; }
        .money-box b { font-size: 48px; color: var(--secondary); display: block; margin: 15px 0; }
        .qr-screen-box { background: white; border: 1px solid #e2e8f0; border-radius: 10px; padding: 15px; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 150px; }
        #qrcode-screen { margin-top: 10px; }
        #sec-code-display { margin-top: 10px; font-weight: bold; font-size: 15px; color: #1e293b; letter-spacing: 1px; }
        .num-blue { color: #2563eb; font-weight: bold; }
        .cash-red { color: #f43f5e; font-weight: bold; }
        .label-type { background: #f1f5f9; padding: 2px 6px; border-radius: 4px; margin: 0 3px; font-size: 13px; color: #475569; border: 1px solid #e2e8f0; }
        .error-row { color: var(--error); background: #fef2f2; padding: 10px; border-radius: 8px; border-left: 4px solid var(--error); margin-bottom: 10px; font-size: 14px; }
        .valid-row { border-bottom: 1px solid #f1f5f9; padding-bottom: 10px; margin-bottom: 15px; }
        .valid-row strong { color: #1e293b; font-size: 18px; display: block; margin-bottom: 5px; text-transform: uppercase; }
        #toast { visibility: hidden; min-width: 250px; background-color: #333; color: #fff; text-align: center; border-radius: 8px; padding: 16px; position: fixed; z-index: 1000; left: 50%; bottom: 30px; transform: translateX(-50%); font-size: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        #toast.show { visibility: visible; animation: fadein 0.5s, fadeout 0.5s 2.5s; }
        @keyframes fadein { from {bottom: 0; opacity: 0;} to {bottom: 30px; opacity: 1;} }
        @keyframes fadeout { from {bottom: 30px; opacity: 1;} to {bottom: 0; opacity: 0;} }
        .print-only { display: none; }
        @media print {
            @page { size: 80mm auto; margin: 0; }
            body { background: white; padding: 0; margin: 0; display: block; }
            .app-container { box-shadow: none; width: 80mm; padding: 4mm; border-radius: 0; }
            h2, textarea, .controls, .right-panel, #toast { display: none !important; }
            .result-grid { display: block; width: 100%; }
            .detail-box { border: none; padding: 0; min-height: auto; font-size: 15px; color: black; }
            .print-only { display: block; }
            .bill-header { text-align: right; font-weight: bold; font-size: 14px; margin-bottom: 15px; }
            .valid-row { border-bottom: 1px dashed black; padding: 10px 0; margin-bottom: 0; }
            .valid-row strong { font-size: 16px; margin-bottom: 5px; }
            .bill-footer { margin-top: 20px; border-top: 2px solid black; padding-top: 15px; display: flex; flex-direction: column; align-items: center; justify-content: center; }
            .total-print { font-size: 24px; font-weight: bold; margin-bottom: 15px; }
            #qrcode-bill { filter: grayscale(100%); display: flex; justify-content: center; margin-bottom: 5px; }
            .sec-code-print { font-size: 12px; font-weight: bold; text-align: center; color: #333; }
            .thanks { text-align: center; margin-top: 15px; font-size: 14px; font-style: italic; width: 100%; display: block; }
        }
    </style>
</head>
<body>

<div class="app-container">
    <h2>Hệ thống tính tiền</h2>
    <textarea id="raw_input" placeholder="Nhập dữ liệu tại đây..."></textarea>
    
    <div class="controls">
        <button class="btn-calc" onclick="thucThi()">Xác Nhận</button>
        <button class="btn-copy" onclick="copyZalo()">Copy Zalo</button>
        <button class="btn-print" onclick="window.print()">In Kết Quả</button>
        <button class="btn-clear" onclick="xoaHet()">Xóa</button>
    </div>

    <div class="result-grid">
        <div id="result_detail" class="detail-box">Chưa có dữ liệu...</div>
        <div class="right-panel">
            <div class="money-box">
                <span style="font-weight:bold; color:#f43f5e;">TỔNG TIỀN</span>
                <b><span id="result_total">0</span></b>
                <div style="font-size: 13px; color:#64748b; border-top: 1px solid #fecdd3; padding-top: 15px;">Xuống cò: x 0.8</div>
            </div>
            <div class="qr-screen-box">
                <span style="font-size: 12px; color: #64748b; text-transform: uppercase;">Mã QR Đối Soát</span>
                <div id="qrcode-screen"></div>
                <div id="sec-code-display"></div>
            </div>
        </div>
    </div>
</div>

<div id="toast"></div>

<script>
// 1. GẮN KẾT TELEGRAM VÀ LẤY ID KHÁCH HÀNG
const tg = window.Telegram.WebApp;
tg.expand();

let userId = "";
if (tg.initDataUnsafe && tg.initDataUnsafe.user) {
    userId = tg.initDataUnsafe.user.id;
}

// =========================================================================
// 2. 🔴 QUAN TRỌNG: DÁN LINK GOOGLE APPS SCRIPT (Đã Deploy New Version) VÀO ĐÂY:
const GAS_URL = "https://script.google.com/macros/s/AKfycbzwdvEagOorImdtMLu5bky9BlhBDOlBLBeXCneb8h37I_yEG_p5Zbc7xbvPrAXbCxUt/exec"; 
// =========================================================================

window.billText = ""; 

function showToast(message) {
    let x = document.getElementById("toast");
    x.innerText = message; x.className = "show";
    setTimeout(function(){ x.className = x.className.replace("show", ""); }, 3000);
}

function copyZalo() {
    if (!window.billText) { showToast("⚠️ Chưa có dữ liệu để Copy!"); return; }
    navigator.clipboard.writeText(window.billText).then(() => { showToast("📋 Đã copy nội dung gửi Zalo!"); });
}

function convertDai(d) {
    d = d.toLowerCase().trim();
    if (d.includes("4dn") || d.includes("4dmn")) return "4dn";
    if (d.includes("2dn") || d.includes("2dmn")) return "2dn";
    if (d.includes("3dn") || d.includes("3dt") || d.includes("3dmn")) return "3dt";
    if (d.includes("mb") || d.includes("hn") || d.includes("hà nội")) return "hn";
    if (/\d/.test(d)) return null; 
    return d; 
}

function mapLoaiChoi(s) {
    s = s.toLowerCase().trim();
    if (s.includes("xc")) return "xc";
    if (s.includes("da") || s.includes("đá")) return "da";
    if (s.includes("dd") || s.includes("đầu đuôi")) return "dd";
    if (s.includes("dau") || s.includes("đầu")) return "dau";
    if (s.includes("duoi") || s.includes("đuôi")) return "duoi";
    if (s.includes("7lo")) return "b7lo";
    if (s.includes("4lo")) return "b4lo";
    if (s.includes("bao") || s.includes("lo") || s === "b") return "b";
    return null;
}

function layHeSo(dai, loai, len) {
    let nhom = (dai === "hn") ? "MB" : (dai.includes('4d') ? "4D" : (dai.includes('3d') ? "3D" : (dai.includes('2d') ? "2D" : "1D")));
    if (loai === 'b') {
        const b_table = { "1D": {2:18, 3:17, 4:16}, "2D": {2:36, 3:34, 4:32}, "3D": {2:54, 3:51, 4:48}, "4D": {2:72, 3:68, 4:64}, "MB": {2:27, 3:23, 4:20} };
        return b_table[nhom][len] || b_table[nhom][2];
    }
    const khac = { "da": {"1D":36, "2D":72, "3D":216, "4D":432, "MB":54}, "xc": {"1D":2, "2D":4, "3D":6, "4D":8, "MB":4}, "dd": {"1D":2, "2D":4, "3D":6, "4D":8, "MB":5}, "dau": {"1D":1, "2D":2, "3D":3, "4D":4, "MB":1}, "duoi": {"1D":1, "2D":2, "3D":3, "4D":4, "MB":1}, "b7lo": {"1D":7, "2D":14, "3D":21, "4D":28, "MB":7}, "b4lo": {"1D":4, "2D":8, "3D":12, "4D":16, "MB":4} };
    return khac[loai] ? (khac[loai][nhom] || 0) : 0;
}

function thucThi() {
    let input = document.getElementById('raw_input').value;
    if (!input) return;

    input = input.replace(/(\d+),(\d+)/g, '$1.$2');
    input = input.replace(/(\d+)\s*-\s*(\d+)/g, '$1-$2');
    let sections = input.split('|');
    let totalAll = 0, detailHTML = "";
    let now = new Date();
    let dateStr = now.getDate().toString().padStart(2, '0') + '/' + (now.getMonth() + 1).toString().padStart(2, '0') + '/' + now.getFullYear();
    let secCode = "SEC-" + Math.random().toString(36).substr(2, 4).toUpperCase();
    
    window.billText = ""; 
    detailHTML += `<div class="print-only"><div class="bill-header">${dateStr}</div></div>`;

    sections.forEach((sec, idx) => {
        let parts = sec.split(':');
        if (parts.length < 2) { detailHTML += `<div class="error-row">⚠️ Dòng ${idx+1}: Sai định dạng.</div>`; return; }
        
        let daiRaw = parts[0].trim();
        let dai = convertDai(daiRaw);
        if (!dai) { detailHTML += `<div class="error-row">⚠️ Dòng ${idx+1}: Không nhận diện được đài "${daiRaw}".</div>`; return; }

        window.billText += "ĐÀI: " + daiRaw.toUpperCase() + "\n";
        let entries = parts[1].split(',');
        let lineDetail = []; let lastNums = []; 

        entries.forEach(e => {
            e = e.trim();
            let mMoney = e.match(/(\d+(\.\d+)?)$/);
            if (!mMoney) { lineDetail.push(`<span style="color:orange">[Lỗi tiền]</span>`); return; }
            let tien = parseFloat(mMoney[1]);
            let conLai = e.replace(mMoney[1], "").trim();
            let mSo = conLai.match(/[0-9\-\(\)]{2,}/g);
            let soGocRaw = mSo ? mSo[0].trim() : "";
            let soGoc = soGocRaw.replace(/[\(\)]/g, ""); 
            let loaiRaw = conLai.replace(soGocRaw, "").trim();
            let loai = mapLoaiChoi(loaiRaw);

            if (!loai) { lineDetail.push(`<span style="color:orange">[Lỗi kiểu]</span>`); return; }

            let currentNums = soGoc ? soGoc.split('-').filter(n => n.length >= 2) : lastNums;
            
            if (currentNums.length > 0) {
                let subTotal = 0;
                if (loai === 'da') {
                    let v = {2:1, 3:3, 4:6, 5:10, 6:15, 7:21, 8:28, 9:36, 10:45};
                    subTotal = tien * (v[currentNums.length] || 0) * layHeSo(dai, 'da', 0) * 0.8;
                } else {
                    currentNums.forEach(n => { subTotal += tien * layHeSo(dai, loai, n.length) * 0.8; });
                }
                totalAll += subTotal;
                
                let playLine = `${currentNums.join('-')} ${loai} ${tien}`;
                lineDetail.push(`<span class="num-blue">${currentNums.join('-')}</span><span class="label-type">${loai}</span><span class="cash-red">${tien}</span>`);
                window.billText += playLine + "\n";
                if (soGoc) lastNums = currentNums;
            } else { lineDetail.push(`<span style="color:orange">[Thiếu số]</span>`); }
        });
        detailHTML += `<div class="valid-row"><strong>${daiRaw}:</strong> ${lineDetail.join(' | ')}</div>`;
    });
    
    let finalPrint = Math.round(totalAll).toString();
    window.billText += "----------------\nTỔNG CỘNG: " + finalPrint;

    detailHTML += `<div class="print-only"><div class="bill-footer"><div class="total-print">Tổng: ${finalPrint}</div><div id="qrcode-bill"></div><div class="sec-code-print">${secCode}</div></div><div class="thanks">Cám ơn quý khách!!!</div></div>`;

    document.getElementById('result_detail').innerHTML = detailHTML;
    document.getElementById('result_total').innerText = finalPrint;
    document.getElementById('sec-code-display').innerText = secCode;

    let qrData = GAS_URL + "?id=" + secCode;
    document.getElementById('qrcode-screen').innerHTML = "";
    new QRCode(document.getElementById("qrcode-screen"), { text: qrData, width: 120, height: 120 });
    if (document.getElementById('qrcode-bill')) { new QRCode(document.getElementById("qrcode-bill"), { text: qrData, width: 90, height: 90 }); }

    // 3. BẮN DỮ LIỆU SANG GOOGLE (Gửi kèm ID Telegram)
    let payloadData = { 
        dai: sections[0].split(':')[0].toUpperCase(), 
        chiTiet: input, 
        tongTien: finalPrint,
        secCode: secCode,
        telegramId: userId 
    };

    fetch(GAS_URL, {
        method: "POST",
        body: JSON.stringify(payloadData)
    }).then(res => {
        showToast("✅ Đã lưu Sheet & Gửi Telegram thành công!");
    }).catch(err => {
        showToast("❌ Không thể kết nối Server!");
    });
}

function xoaHet() {
    document.getElementById('raw_input').value = "";
    document.getElementById('result_detail').innerHTML = "Chưa có dữ liệu...";
    document.getElementById('result_total').innerText = "0";
    document.getElementById('qrcode-screen').innerHTML = "";
    document.getElementById('sec-code-display').innerText = "";
    window.billText = "";
}
</script>
</body>
</html>
